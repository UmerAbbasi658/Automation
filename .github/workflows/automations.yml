name: Robin Automation

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Secrets and environment variables for Python
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      PROPOSAL_ID: "344878"
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright Browsers
        uses: microsoft/playwright-github-action@v1
        with:
          browser: chromium

      - name: Debug Environment Variables
        run: |
          echo "Checking critical environment variables..."
          if [ -z "$GOOGLE_SERVICE_ACCOUNT" ]; then
            echo "❌ GOOGLE_SERVICE_ACCOUNT is missing!"
            exit 1
          else
            echo "✅ GOOGLE_SERVICE_ACCOUNT is set"
          fi
          if [ -z "$SPREADSHEET_ID" ]; then
            echo "❌ SPREADSHEET_ID is missing!"
            exit 1
          else
            echo "✅ SPREADSHEET_ID is set"
          fi
          if [ -z "$DRIVE_FOLDER_ID" ]; then
            echo "❌ DRIVE_FOLDER_ID is missing!"
            exit 1
          else
            echo "✅ DRIVE_FOLDER_ID is set"
          fi

      - name: Run Automation
        run: python main.py